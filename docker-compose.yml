services:

  techstaff_backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: TechStaff_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      DB_PORT: 3306
      HOST: 0.0.0.0
      PORT: 3000
    networks:
      - techstaff_network

  techstaff_frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: TechStaff_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - techstaff_backend
    environment:
      VITE_BACKEND_URL: /api/v1
    networks:
      - techstaff_network

  db:
    image: mysql:8.0
    container_name: TechStaff_Database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techstaff_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: TechStaff_Database_Visualizer
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - db
    networks:
      - techstaff_network

volumes:
  db_data:

networks:
  techstaff_network:
    driver: bridge